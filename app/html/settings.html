<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>설정 - 랜덤 문제 출제 프로그램</title>


    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="../css/style.css?v=3">
</head>
<body>
    <!-- Toast Container -->
    <div id="toast-container" class="toast" role="alert" aria-live="polite"></div>

    <!-- Loading Spinner -->
    <div id="loading-spinner" class="loading-spinner" style="display:none;">
        <i class="fas fa-spinner fa-spin"></i>
        <span>로딩 중...</span>
    </div>

    <div class="container">
        <h1>랜덤 문제 출제 프로그램</h1>

        <!-- Tab Buttons -->
        <div class="tab-buttons" role="tablist">
            <a href="index.html" class="tab-btn">문제 풀기</a>
            <a href="admin.html" class="tab-btn">문제 등록</a>
            <a href="list.html" class="tab-btn">문제 목록</a>
            <a href="deleted.html" class="tab-btn">삭제된 문제</a>
            <a href="settings.html" class="tab-btn active">설정</a>
        </div>

        <!-- Settings Section -->
        <div id="settings-section" class="admin-section">
            <h2>설정</h2>

            <!-- API 설정 섹션 -->
            <div class="settings-section">
                <h3>API 설정</h3>

                <div class="form-group">
                    <label for="apiKey">ChatGPT API 키:</label>
                    <input type="password" id="apiKey" name="apiKey" class="form-control" placeholder="sk-...">
                    <small style="color: #666; display: block; margin-top: 5px;">
                        OpenAI API 키를 입력하세요. 문제 문장을 자동으로 재구성하는데 사용됩니다.
                    </small>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="enableRephrase" name="enableRephrase" checked>
                        문제 문장 자동 재구성 사용
                    </label>
                    <small style="color: #666; display: block; margin-top: 5px;">
                        체크하면 문제가 나올 때마다 같은 의미이지만 다른 문장 구조로 표시됩니다.
                    </small>
                </div>
            </div>

            <button type="button" id="btnSaveSettings" class="submit-btn" style="margin-top: 20px;">설정 저장</button>
        </div>
    </div>

    <!-- Main JavaScript (ES6 Modules) -->
    <script src="../js/bundle.js"></script>
</body>
</html>
