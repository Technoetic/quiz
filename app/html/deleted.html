<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>삭제된 문제 - 랜덤 문제 출제 프로그램</title>


    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="../css/style.css?v=3">
</head>
<body>
    <!-- Toast Container -->
    <div id="toast-container" class="toast" role="alert" aria-live="polite"></div>

    <!-- Loading Spinner -->
    <div id="loading-spinner" class="loading-spinner" style="display:none;">
        <i class="fas fa-spinner fa-spin"></i>
        <span>로딩 중...</span>
    </div>

    <div class="container">
        <h1>랜덤 문제 출제 프로그램</h1>

        <!-- Tab Buttons -->
        <div class="tab-buttons" role="tablist">
            <a href="index.html" class="tab-btn">문제 풀기</a>
            <a href="admin.html" class="tab-btn">문제 등록</a>
            <a href="list.html" class="tab-btn">문제 목록</a>
            <a href="deleted.html" class="tab-btn active">삭제된 문제</a>
            <a href="settings.html" class="tab-btn">설정</a>
        </div>

        <!-- Deleted Questions Section -->
        <div id="deleted-section" class="admin-section">
            <h2>삭제된 문제</h2>
            <p style="color: #666; margin-bottom: 20px;">
                삭제된 문제는 완전히 제거되지 않고 보관됩니다. 필요시 복원할 수 있습니다.
            </p>

            <div class="filter-group" style="margin-bottom: 20px;">
                <label for="deletedSubjectFilter">과목 필터:</label>
                <select id="deletedSubjectFilter" class="form-control" style="max-width: 400px;">
                    <option value="">전체</option>
                </select>
            </div>

            <div id="deletedQuestionStats" style="margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 5px;">
                <strong>통계:</strong>
                <span id="deletedCount">0개</span> 삭제된 문제
            </div>

            <div class="button-group" style="margin-bottom: 20px;">
                <button type="button" id="btnRestoreAll" class="submit-btn" style="background: #28a745;">전체 복원</button>
                <button type="button" id="btnPermanentDeleteAll" class="submit-btn" style="background: #dc3545;">영구 삭제 (전체)</button>
            </div>

            <div class="question-list" id="deletedQuestionList"></div>
        </div>
    </div>

    <!-- Main JavaScript (ES6 Modules) -->
    <script src="../js/bundle.js"></script>
</body>
</html>
